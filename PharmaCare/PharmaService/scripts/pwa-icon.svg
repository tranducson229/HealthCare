<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12b886"/>
      <stop offset="1" stop-color="#0ca678"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e6fcf5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- medical cross -->
  <g fill="#ffffff">
    <rect x="212" y="120" width="88" height="272" rx="24"/>
    <rect x="120" y="212" width="272" height="88" rx="24"/>
  </g>
  <!-- capsule -->
  <g transform="rotate(45 256 256)">
    <rect x="196" y="236" width="120" height="40" rx="20" fill="url(#pill)"/>
    <rect x="196" y="236" width="60" height="40" rx="20" fill="#ff6b6b"/>
  </g>
</svg>
